        /* RESET RULES
–––––––––––––––––––––––––––––––––––––––––––––––––– */
:root {
  --black: #3a3a3a;
  --white: #fff;
  --green: #49b293;
}

* {
  margin: 0;
  padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
    box-sizing: border-box;
}

img {
  display: block;
  max-width: 100%;
  height: auto;
}

ol {
  list-style: none;
}

a {
  text-decoration: none;
  color: inherit;
  color: var(--white);
}

body {
  color: var(--black);
  font: 1rem/1.3 sans-serif;
}

.author-archive {
  padding: 1.5rem;
}


h1 {
  text-align: center;
  margin-bottom: 2rem;
  color: var(--white);

}

h1 a {
  transition: all 0.1s;
  
}

h1 a:hover {
  background: var(--green);
  color: var(--white);
}

input[type="radio"] {
  position: absolute;
  left: -9999px;
  
}


/* FILTERS
–––––––––––––––––––––––––––––––––––––––––––––––––– */
.filters {
  text-align: center;
  margin-bottom: 2rem;
}

.filters * {
  display: inline-block;
}

.filters label {
  padding: 0.5rem 1rem;
  margin-bottom: 0.25rem;
  border-radius: 2rem;
  min-width: 50px;
  line-height: normal;
  cursor: pointer;
  transition: all 0.1s;
}

.filters label:hover {
  background: var(--green);
  color: var(--white);
}


/* FILTERED ELEMENTS (POSTS)
–––––––––––––––––––––––––––––––––––––––––––––––––– */
.posts {
  display: grid;
  grid-gap: 1rem;
  grid-template-columns: repeat(2, 1fr);
  border-radius: 10px;

}

.posts .post {
  background: #262626;
  /* border: 2px solid rgba(255, 255, 255, 0.1); */
  border-radius: 10px;}

.posts .post-title {
  font-size: 1.3rem;
}

.posts .post-title:hover {
  text-decoration: underline;
}

.posts figcaption {
  padding: 1rem;
}

.posts .post-categories {
  margin-bottom: 0.75rem;
  font-size: 0.75rem;
}

.posts .post-categories * {
  display: inline-block;
}

.posts .post-categories li {
  margin-bottom: 0.2rem;
}

.posts .post-categories a {
  padding: 0.2rem 0.5rem;
  border-radius: 1rem;
  border: 1px solid;
  line-height: normal;
  transition: all 0.1s;
}

.posts .post-categories a:hover {
  background: var(--green);
  color: var(--white);
}


/* FILTERING RULES
–––––––––––––––––––––––––––––––––––––––––––––––––– */
[value="All"]:checked ~ .filters [for="All"],
[value="CSS"]:checked ~ .filters [for="CSS"],
[value="JavaScript"]:checked ~ .filters [for="JavaScript"],
[value="jQuery"]:checked ~ .filters [for="jQuery"],
[value="WordPress"]:checked ~ .filters [for="WordPress"],
[value="Slider"]:checked ~ .filters [for="Slider"],
[value="fullPage.js"]:checked ~ .filters [for="fullPage.js"] {
  background: var(--green);
  color: var(--white);
}

[value="All"]:checked ~ .posts [data-category] {
  display: block;
}

[value="CSS"]:checked ~ .posts .post:not([data-category~="CSS"]),
[value="JavaScript"]:checked ~ .posts .post:not([data-category~="JavaScript"]),
[value="jQuery"]:checked ~ .posts .post:not([data-category~="jQuery"]),
[value="WordPress"]:checked ~ .posts .post:not([data-category~="WordPress"]),
[value="Slider"]:checked ~ .posts .post:not([data-category~="Slider"]),
[value="fullPage.js"]:checked ~ .posts .post:not([data-category~="fullPage.js"]) {
  display: none;
}

/* MQ
–––––––––––––––––––––––––––––––––––––––––––––––––– */
@media screen and (max-width: 900px) {
  .posts {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media screen and (max-width: 650px) {
  html {
    font-size: 14px;
  }

  .posts {
    grid-template-columns: repeat(2, 1fr);
  }
}

    color: var(--primary-color);
    font-size: 20px;
    font-weight: 600;
    background-color: transparent;
    cursor: pointer;
    transition: background 0.5s, color 0.5s;

  .btn:hover {

  }
  /* -------------------------------------------------------*/
  nav {
    display: flex;

    justify-content: space-between;
  }
  
  nav img {
    width: 190px;
  }
  
  nav .fa-solid,
  nav p {
    display: none;
  }
  
  nav ul li {
    display: inline-block;
    margin-right: 18px;
    position: relative;
  }
  
  nav ul li a {
    text-decoration: none;
    color: white;
    font-size: 19px;
    display: inline-block;
    font-weight: 600;
  }
  
  nav ul li a span {
    font-size: 18px;
    font-weight: 900;
  }
  
  nav ul li a::after {
    content: "";
    width: 0%;
    height: 3px;
    background: var(--primary-color);
    position: absolute;
    left: 0px;
    bottom: -6px;
    transition: width 0.5s;
  }
  
  nav ul li a:hover::after {
    width: 100%;
  }
  
  .header-text {
    margin-top: 300px;
  }
  
  .header-text p {
    font-size: 30px;
    font-weight: 500;
  }
  
  .header-text h1 {
    font-size: 50px;
    font-weight: 800;
  }

    position:static;
  left: 0;
  bottom: 0;
  width: 100%;

    
  }
  
  /* ------------------- CSS For Mobile Screens ------------------- */
  
  @media screen and (max-width: 890px) {
    #header nav ul li a .color {

<script>var tabLinks = document.getElementsByClassName("tab-links");
  var tabContents = document.getElementsByClassName("tab-contents");
  
  function openTab(tabName) {
    for (let tabLink of tabLinks) {
      tabLink.classList.remove("active-link");
    }
  
    for (let tabContent of tabContents) {
      tabContent.classList.remove("active-tab");
    }
  
    event.currentTarget.classList.add("active-link");
    document.getElementById(tabName).classList.add("active-tab");
  }
  
  // ---------------- JS for Mobile Menu ------------------
  var mobileMenu = document.getElementById("mobile-menu");
  function openMenu() {
    mobileMenu.style.right = "0px";
  }
  
  function closeMenu() {
    mobileMenu.style.right = "-400px";
  }
  </script>
